<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MonochromeAi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  text-align: center;
  padding: 30px;
  border-bottom: 1px solid #222;
}

h1 {
  font-size: 38px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111;
  padding: 20px;
  margin: 15px 0;
  border-radius: 10px;
  border: 1px solid #222;
  transition: 0.3s;
}

.card:hover {
  border: 1px solid #fff;
}

.token {
  font-size: 20px;
  font-weight: bold;
}

.desc {
  color: #aaa;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <h1>🚀 MONOCHROME AI</h1>
  <p>Tracking the Hottest Crypto Trends</p>
</header>

<div class="container">

  <div class="card">
    <div class="token">🔥 AI Token</div>
    <div class="desc">AI narrative crypto gaining momentum.</div>
  </div>

  <div class="card">
    <div class="token">🚀 Meme Coin</div>
    <div class="desc">Community-driven hype token trending fast.</div>
  </div>

  <div class="card">
    <div class="token">⚡ DeFi Gem</div>
    <div class="desc">High yield DeFi ecosystem with growth potential.</div>
  </div>

</div>

</body>
</html>
