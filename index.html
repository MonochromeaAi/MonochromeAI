<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MonochromeAi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAVBAR */
nav {
  position: sticky;
  top: 0;
  background: #000;
  padding: 10px 20px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

nav a {
  color: #00ffcc;
  text-decoration: none;
  font-size: 14px;
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 20px;
  border-bottom: 1px solid #222;
}

header img {
  width: 140px;
}

h1 {
  margin: 10px 0;
  font-size: 32px;
}

.subtitle {
  color: #aaa;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* SEARCH */
.search {
  margin-bottom: 20px;
}

.search input {
  width: 100%;
  padding: 12px;
  background: #111;
  border: 1px solid #222;
  border-radius: 8px;
  color: white;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  border: 1px solid #222;
  transition: 0.3s;
}

.card:hover {
  border: 1px solid #fff;
  transform: translateY(-3px);
}

.token {
  font-size: 20px;
  font-weight: bold;
}

.desc {
  color: #aaa;
  margin: 8px 0;
}

.read {
  color: #00ffcc;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #222;
  color: #666;
  font-size: 12px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div>MonochromeAi</div>
  <a href="index.html">🏠 Home</a>
</nav>

<header>
  <img src="./logo.png">
  <h1>MONOCHROME AI</h1>
  <div class="subtitle">Crypto Intelligence & Hype Token Analysis</div>
</header>

<div class="container">

  <!-- SEARCH -->
  <div class="search">
    <input type="text" placeholder="Search token...">
  </div>

  <h2>🔥 Latest Articles</h2>

  <!-- VDOR -->
  <div class="card">
    <div class="token">🚀 VDOR</div>
    <div class="desc">Emerging token gaining strong market attention.</div>
    <a class="read" href="articles/vdor.html">Read Article →</a>
  </div>

  <!-- RAVE DAO -->
  <div class="card">
    <div class="token">🔥 Rave DAO</div>
    <div class="desc">Community-driven DeFi project trending now.</div>
    <a class="read" href="articles/rave-dao.html">Read Article →</a>
  </div>

</div>

<footer>
  © 2026 MonochromeAi — All rights reserved
</footer>

</body>
</html>
