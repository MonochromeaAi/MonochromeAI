<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MonochromeAi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 20px;
  border-bottom: 1px solid #222;
}

header img {
  width: 150px;
  margin-bottom: 10px;
}

h1 {
  margin: 0;
  font-size: 34px;
}

.subtitle {
  color: #aaa;
  font-size: 14px;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* SECTION */
.section-title {
  font-size: 22px;
  margin-bottom: 15px;
}

/* CARD */
.card {
  background: #111;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  border: 1px solid #222;
  transition: 0.3s;
}

.card:hover {
  border: 1px solid #fff;
  transform: translateY(-3px);
}

.token {
  font-size: 20px;
  font-weight: bold;
}

.desc {
  color: #aaa;
  font-size: 14px;
  margin: 8px 0;
}

.read {
  color: #00ffcc;
  text-decoration: none;
  font-size: 14px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #222;
  color: #666;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <img src="./logo.png" alt="logo">
  <h1>MONOCHROME AI</h1>
  <div class="subtitle">Crypto Intelligence & Hype Token Analysis</div>
</header>

<div class="container">

  <div class="section-title">🔥 Latest Articles</div>

  <!-- VDOR -->
  <div class="card">
    <div class="token">🚀 VDOR</div>
    <div class="desc">Emerging token gaining strong market attention.</div>
    <a class="read" href="articles/vdor.html">Read Article →</a>
  </div>

  <!-- RAVE DAO -->
  <div class="card">
    <div class="token">🔥 Rave DAO</div>
    <div class="desc">Community-driven DeFi project trending now.</div>
    <a class="read" href="articles/rave-dao.html">Read Article →</a>
  </div>

</div>

<footer>
  © 2026 MonochromeAi — All rights reserved
</footer>

</body>
</html>
