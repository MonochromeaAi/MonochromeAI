<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MonochromeAi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  text-align: center;
  padding: 40px;
  border-bottom: 1px solid #222;
}

header img {
  width: 160px;
  margin-bottom: 15px;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #222;
}

.token {
  font-size: 18px;
  font-weight: bold;
}

.price {
  color: #00ffcc;
}

</style>
</head>

<body>

<header>
  <img src="./logo.png">
  <h1>MONOCHROME AI</h1>
  <p>Live Crypto Intelligence</p>
</header>

<div class="container">
  <h2>🔥 Live Prices</h2>
  <div id="crypto-list"></div>
</div>

<script>
async function loadCrypto() {
  const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
  const data = await res.json();

  let html = "";

  data.slice(0, 10).forEach(coin => {
    html += `
      <div class="card">
        <div class="token">${coin.name}</div>
        <div class="price">$${coin.current_price}</div>
      </div>
    `;
  });

  document.getElementById("crypto-list").innerHTML = html;
}

loadCrypto();
</script>

</body>
</html>
